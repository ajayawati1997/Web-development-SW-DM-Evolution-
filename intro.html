<!-- This file controls the website intro only. -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SWDM Evolution Intro</title>
  <link rel="stylesheet" href="css/intro.css">
  <script src="js/intro.js" defer></script>
</head>
<body class="swdm-intro-standalone">
  <section class="swdm-intro" role="dialog" aria-label="SWDM Evolution website intro" aria-modal="true">
    <div class="swdm-intro__backdrop" aria-hidden="true">
      <span class="swdm-intro__grid"></span>
      <span class="swdm-intro__scan"></span>
      <span class="swdm-intro__redline swdm-intro__redline--top"></span>
      <span class="swdm-intro__redline swdm-intro__redline--bottom"></span>
      <span class="swdm-intro__reticle swdm-intro__reticle--one"></span>
      <span class="swdm-intro__reticle swdm-intro__reticle--two"></span>
    </div>

    <div class="swdm-intro__stage">
      <div class="swdm-intro__brand">
        <img class="swdm-intro__logo" src="assets/intro/swdm-intro-logo.svg" alt="SWDM Evolution logo">
        <p class="swdm-intro__name">SWDM EVOLUTION</p>
        <p class="swdm-intro__tagline">DESIGN &bull; DEVELOPMENT &bull; MACHINING</p>
      </div>

      <div class="swdm-intro__recap" aria-label="SWDM Evolution services">
        <p class="swdm-intro__recap-label">SERVICE RECAP</p>
        <ul class="swdm-intro__service-list"></ul>
      </div>
    </div>

    <button class="swdm-intro__skip" type="button">Skip Intro</button>
  </section>
</body>
</html>
