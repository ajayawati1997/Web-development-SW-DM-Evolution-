<!-- This file controls the website intro only. -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SWDM Evolution Intro</title>
  <link rel="stylesheet" href="css/intro.css">
  <script src="js/intro.js" defer></script>
</head>
<body class="swdm-intro-standalone">
  <section class="swdm-intro" role="dialog" aria-label="SWDM Evolution website intro" aria-modal="true">
    <div class="swdm-intro__atmosphere" aria-hidden="true">
      <span class="swdm-intro__smoke"></span>
    </div>

    <div class="swdm-intro__name-reveal" aria-hidden="true">
      <span>SWDM EVOLUTION</span>
    </div>

    <div class="swdm-intro__dd-stage">
      <span class="swdm-intro__logo-spark" aria-hidden="true"></span>
      <div class="swdm-intro__type-logo" aria-hidden="true">SWDM</div>
      <div class="swdm-intro__word-burst" aria-hidden="true">
        <span>DESIGN</span>
        <span>DEVELOPMENT</span>
        <span>MACHINING</span>
      </div>
    </div>

    <div class="swdm-intro__service-stage" aria-label="SWDM Evolution cinematic service recap">
      <article class="swdm-intro__service-panel is-design">
        <img src="assets/gallery/haas-vf2yt-modeling-crop.jpg" alt="CAD model and design modeling">
        <div>
          <p>DESIGN</p>
          <span>CAD model rotating &bull; blueprints &bull; digital wireframe</span>
        </div>
      </article>
      <article class="swdm-intro__service-panel is-development">
        <img src="assets/gallery/assembly-design-check-ramer.jpg" alt="Prototype assembly and product validation">
        <div>
          <p>DEVELOPMENT</p>
          <span>Prototype assembly &bull; measurement &bull; validation</span>
        </div>
      </article>
      <article class="swdm-intro__service-panel is-machining">
        <img src="assets/haas-machine.png" alt="Haas CNC machine for machining service">
        <div>
          <p>MACHINING</p>
          <span>Haas CNC &bull; tool change &bull; chips &bull; precision finish</span>
        </div>
      </article>
    </div>

    <div class="swdm-intro__final-lockup">
      <div class="swdm-intro__final-mark" aria-hidden="true">SWDM</div>
      <p>SWDM EVOLUTION</p>
      <span>DESIGN &bull; DEVELOPMENT &bull; MACHINING</span>
    </div>

    <button class="swdm-intro__skip" type="button">Skip Intro</button>
  </section>
</body>
</html>
